name: Publish to npm

# Publishes the `agent-hollow` package to npm when a version tag is pushed
# (e.g. v0.9.0), using npm Trusted Publishing (OIDC) — no token, no secret.
# npmjs.com must list this repo + workflow as the package's Trusted Publisher
# (package → Settings → Trusted Publisher: acaylor/agent-hollow, publish.yml).
#
# Requirements: GitHub-hosted runner, `id-token: write`, npm >= 11.5.1
# (Node 22 bundles an older npm, hence the upgrade step). Provenance
# attestation is generated automatically with trusted publishing.
#
# Release flow:
#   npm version minor        # bumps the version + creates tag vX.Y.Z
#   git push && git push --tags
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC exchange with npm (trusted publishing + provenance)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: npm ci
      # prepublishOnly in package.json runs the build + full test suite first.
      - run: npm publish
